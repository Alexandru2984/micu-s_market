services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-micu_market}
      POSTGRES_USER: ${DB_USER:-micu}
      POSTGRES_PASSWORD: ${DB_PASS:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-micu} -d ${DB_NAME:-micu_market}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DJANGO_SETTINGS_MODULE: Micu_market.settings_production
    command: >
      sh -c "python manage.py migrate --noinput
      && python manage.py collectstatic --noinput
      && gunicorn -c gunicorn.conf.py Micu_market.asgi:application"
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  static_data:
