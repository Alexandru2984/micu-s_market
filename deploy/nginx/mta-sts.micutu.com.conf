server {
    listen 80;
    server_name mta-sts.micutu.com;

    location = /.well-known/mta-sts.txt {
        default_type text/plain;
        alias /var/www/mta-sts.micutu.com/.well-known/mta-sts.txt;
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name mta-sts.micutu.com;

    ssl_certificate /etc/letsencrypt/live/mta-sts.micutu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mta-sts.micutu.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; base-uri 'none'; frame-ancestors 'none'; object-src 'none'" always;

    location = /.well-known/mta-sts.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600" always;
        alias /var/www/mta-sts.micutu.com/.well-known/mta-sts.txt;
    }

    location / {
        return 404;
    }
}
