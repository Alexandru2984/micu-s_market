server {
    listen 80;
    server_name market.micutu.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name market.micutu.com;

    client_max_body_size 25M;

    # Restore the real client IP from Cloudflare so rate limiting and audit
    # logging key on the actual visitor and not the Cloudflare edge. Only
    # trusted from Cloudflare ranges, so direct-to-origin clients cannot spoof.
    # Source: https://www.cloudflare.com/ips-v4 and ips-v6
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Configure certificate paths for this VPS.
    ssl_certificate /etc/ssl/certs/market.micutu.com.pem;
    ssl_certificate_key /etc/ssl/private/market.micutu.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:MicuMarketSSL:10m;
    ssl_session_timeout 1d;

    server_tokens off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header Cross-Origin-Resource-Policy same-site always;

    location ~ (^|/)\. {
        return 404;
    }

    location = /healthz {
        proxy_pass http://unix:/home/micu/Micu_market/gunicorn.sock;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /home/micu/Micu_market/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy same-origin always;
        add_header Cross-Origin-Resource-Policy same-site always;
    }

    # Chat attachments are private; they must only be served by Django through
    # the per-conversation authorization check (chat:attachment_download).
    # Covers both the current upload path (chat/private/attachments/) and the
    # legacy one (chat/attachments/).
    location ^~ /media/chat/ {
        return 404;
    }

    location /media/ {
        alias /home/micu/Micu_market/media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy same-origin always;
        add_header Cross-Origin-Resource-Policy same-site always;
    }

    location / {
        proxy_pass http://unix:/home/micu/Micu_market/gunicorn.sock;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;
    }
}
