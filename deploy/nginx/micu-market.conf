server {
    listen 80;
    server_name market.micutu.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name market.micutu.com;

    client_max_body_size 25M;

    # Configure certificate paths for this VPS.
    ssl_certificate /etc/ssl/certs/market.micutu.com.pem;
    ssl_certificate_key /etc/ssl/private/market.micutu.com.key;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header Cross-Origin-Resource-Policy same-site always;

    location ~ (^|/)\. {
        return 404;
    }

    location = /healthz {
        proxy_pass http://unix:/home/micu/Micu_market/gunicorn.sock;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /home/micu/Micu_market/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy same-origin always;
        add_header Cross-Origin-Resource-Policy same-site always;
    }

    location ^~ /media/chat/private/ {
        return 404;
    }

    location /media/ {
        alias /home/micu/Micu_market/media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy same-origin always;
        add_header Cross-Origin-Resource-Policy same-site always;
    }

    location / {
        proxy_pass http://unix:/home/micu/Micu_market/gunicorn.sock;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;
    }
}
