{% extends "base.html" %}

{% block title %}Promovează anunțul - Micu's Market{% endblock %}

{% block content %}
<section class="container" style="padding: 2rem 0;">
    <h1>Promovează: {{ listing.title }}</h1>
    {% if plans %}
        <form method="post" style="display: grid; gap: 1rem; max-width: 560px;">
            {% csrf_token %}
            {% for plan in plans %}
                <label style="border: 1px solid #e2e8f0; border-radius: 8px; padding: 1rem; display: flex; gap: 0.75rem; align-items: center;">
                    <input type="radio" name="plan" value="{{ plan.pk }}" required>
                    <span>
                        <strong>{{ plan.name }}</strong><br>
                        {{ plan.days }} zile - {{ plan.price }} {{ plan.currency }}
                    </span>
                </label>
            {% endfor %}
            <button type="submit" class="btn btn-primary">Creează comanda</button>
        </form>
    {% else %}
        <p>Nu există planuri active momentan.</p>
    {% endif %}
</section>
{% endblock %}
